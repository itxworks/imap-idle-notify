name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run unit tests
        run: go test ./...

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: e2e/go.mod
          cache-dependency-path: e2e/go.sum

      # testcontainers-go drives the Docker daemon (preinstalled on the runner)
      # to start a throwaway GreenMail IMAP/SMTP server.
      - name: Run e2e tests
        working-directory: e2e
        run: go test -count=1 ./...
